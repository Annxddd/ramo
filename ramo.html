<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ramo de Margaritas</title>
<link href="https://fonts.googleapis.com/css2?family=Pinyon+Script&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    background: #080808;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  canvas { display: block; }
  .title {
    position: fixed;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%);
    font-family: 'Pinyon Script', cursive;
    font-size: clamp(2.2rem, 5vw, 3.8rem);
    color: #e84070;
    opacity: 0;
    transition: opacity 2s ease;
    white-space: nowrap;
    z-index: 2;
    text-shadow: 0 0 30px rgba(232,64,112,0.7), 0 0 70px rgba(232,64,112,0.3);
  }
  .replay-btn {
    position: fixed;
    bottom: 22px;
    right: 28px;
    background: none;
    border: 1px solid #333;
    color: #666;
    font-size: 0.72rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    padding: 7px 16px;
    cursor: pointer;
    opacity: 0;
    transition: opacity 0.8s, border-color 0.3s, color 0.3s;
    z-index: 2;
    font-family: serif;
  }
  .replay-btn:hover { border-color: #e84070; color: #e84070; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="title" id="title">&#10084;</div>
<button class="replay-btn" id="replayBtn">↺ Redibujar</button>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = () => window.innerWidth;
const H = () => window.innerHeight;
let CX, CY, S;

function setup() {
  const dpr = window.devicePixelRatio || 1;
  canvas.width  = W() * dpr;
  canvas.height = H() * dpr;
  canvas.style.width  = W() + 'px';
  canvas.style.height = H() + 'px';
  ctx.scale(dpr, dpr);
  CX = W() / 2;
  CY = H() / 2;
  S  = Math.min(W(), H()) / 700;
}

// ── EASING ────────────────────────────────────────────────────────
const easeOut  = t => 1 - Math.pow(1-t, 3);
const easeOut5 = t => 1 - Math.pow(1-t, 5);

// ── VASE GEOMETRY ─────────────────────────────────────────────────
function vaseGeo() {
  const vH   = 155 * S;
  const topW = 155 * S;
  const botW =  88 * S;
  const topY = CY + 55 * S;
  const botY = topY + vH;
  return { topY, botY, topW, botW, cx: CX };
}

// ── DRAW VASE ─────────────────────────────────────────────────────
function drawVase(progress) {
  const { topY, botY, topW, botW, cx } = vaseGeo();
  const p = easeOut(progress);
  // Vase grows from bottom up
  const curBotY = botY;
  const curTopY = botY - (botY - topY) * p;
  const frac    = p; // 0→1
  const curTopW = botW + (topW - botW) * frac;
  const curBotW = botW;

  ctx.save();

  // Body
  const grad = ctx.createLinearGradient(cx - curTopW/2, 0, cx + curTopW/2, 0);
  grad.addColorStop(0,   '#7a5a32');
  grad.addColorStop(0.18,'#b88848');
  grad.addColorStop(0.5, '#d4a860');
  grad.addColorStop(0.82,'#b88848');
  grad.addColorStop(1,   '#7a5a32');
  ctx.beginPath();
  ctx.moveTo(cx - curTopW/2, curTopY);
  ctx.lineTo(cx + curTopW/2, curTopY);
  ctx.lineTo(cx + curBotW/2, curBotY);
  ctx.lineTo(cx - curBotW/2, curBotY);
  ctx.closePath();
  ctx.fillStyle = grad;
  ctx.globalAlpha = 0.96;
  ctx.fill();

  // Fold crease lines
  ctx.globalAlpha = 0.12;
  ctx.strokeStyle = '#fff8e8';
  ctx.lineWidth = 1;
  for (let i = 1; i <= 2; i++) {
    const tx = cx - curTopW/2 + curTopW * i/3;
    const bx = cx - curBotW/2 + curBotW * i/3;
    ctx.beginPath();
    ctx.moveTo(tx, curTopY);
    ctx.lineTo(bx, curBotY);
    ctx.stroke();
  }

  // Top rim
  if (p > 0.95) {
    ctx.globalAlpha = 0.7;
    ctx.beginPath();
    ctx.ellipse(cx, curTopY, curTopW/2, curTopW * 0.065, 0, 0, Math.PI*2);
    ctx.fillStyle = '#c09050';
    ctx.fill();
    ctx.strokeStyle = '#8a6030';
    ctx.lineWidth = 1.2;
    ctx.globalAlpha = 0.8;
    ctx.stroke();
  }

  ctx.restore();
  ctx.globalAlpha = 1;
}

// ── DRAW RIBBON ───────────────────────────────────────────────────
function drawRibbon(progress) {
  const { topY, botY, topW, botW, cx } = vaseGeo();
  const t   = 0.3;
  const ry  = topY + (botY - topY) * t;
  const rw  = (botW + (topW - botW) * (1 - t)) * 0.48;
  const p   = easeOut5(progress);

  ctx.save();

  // Band
  ctx.globalAlpha = p * 0.95;
  ctx.fillStyle = '#b02858';
  ctx.beginPath();
  ctx.rect(cx - rw*1.15, ry - 5.5*S, rw*2.3, 11*S);
  ctx.fill();

  // Left loop
  ctx.beginPath();
  ctx.moveTo(cx, ry);
  ctx.bezierCurveTo(cx - rw*1.5, ry - 30*S, cx - rw*2.2, ry + 10*S, cx - rw*0.85, ry+13*S);
  ctx.bezierCurveTo(cx - rw*0.3, ry + 6*S, cx, ry, cx, ry);
  ctx.fillStyle = '#e04878';
  ctx.globalAlpha = p * 0.88;
  ctx.fill();

  // Right loop
  ctx.beginPath();
  ctx.moveTo(cx, ry);
  ctx.bezierCurveTo(cx + rw*1.5, ry - 30*S, cx + rw*2.2, ry + 10*S, cx + rw*0.85, ry+13*S);
  ctx.bezierCurveTo(cx + rw*0.3, ry + 6*S, cx, ry, cx, ry);
  ctx.fillStyle = '#c03060';
  ctx.globalAlpha = p * 0.88;
  ctx.fill();

  // Knot
  ctx.beginPath();
  ctx.ellipse(cx, ry, 9*S, 7*S, 0, 0, Math.PI*2);
  ctx.fillStyle = '#d83868';
  ctx.globalAlpha = p;
  ctx.fill();

  ctx.restore();
  ctx.globalAlpha = 1;
}

// ── DAISY ─────────────────────────────────────────────────────────
function daisy(x, y, size, petColor) {
  const n = 13;
  for (let i = 0; i < n; i++) {
    const a = (i/n) * Math.PI * 2;
    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(a);
    ctx.beginPath();
    ctx.ellipse(0, -size*0.63, size*0.096, size*0.33, 0, 0, Math.PI*2);
    ctx.fillStyle = petColor;
    ctx.globalAlpha = 0.93;
    ctx.fill();
    ctx.restore();
  }
  const g = ctx.createRadialGradient(x, y, 0, x, y, size*0.23);
  g.addColorStop(0,   '#ffe566');
  g.addColorStop(0.55,'#f0a020');
  g.addColorStop(1,   '#c06010');
  ctx.beginPath();
  ctx.arc(x, y, size*0.23, 0, Math.PI*2);
  ctx.fillStyle = g;
  ctx.globalAlpha = 1;
  ctx.fill();
}

// ── LEAF ──────────────────────────────────────────────────────────
function leaf(x, y, size, angle) {
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(angle);
  ctx.beginPath();
  ctx.moveTo(0, 0);
  ctx.bezierCurveTo(size*.5,-size*.15, size*.8,-size*.5, size*.55,-size*.85);
  ctx.bezierCurveTo(size*.28,-size*.5, size*.18,-size*.25, 0, 0);
  ctx.fillStyle = '#3a7a3a';
  ctx.globalAlpha = 0.8;
  ctx.fill();
  ctx.beginPath();
  ctx.moveTo(0,0);
  ctx.quadraticCurveTo(size*.35,-size*.4, size*.5,-size*.8);
  ctx.strokeStyle = '#2a5a2a';
  ctx.lineWidth = 0.8;
  ctx.globalAlpha = 0.4;
  ctx.stroke();
  ctx.restore();
  ctx.globalAlpha = 1;
}

// ── ANIMATED GROW ─────────────────────────────────────────────────
function growShape(drawFn, cx, cy, duration, delay=0) {
  return new Promise(resolve => {
    setTimeout(() => {
      const start = performance.now();
      function frame(now) {
        const t = Math.min((now-start)/duration, 1);
        const p = easeOut5(t);
        ctx.save();
        ctx.translate(cx, cy);
        ctx.scale(p, p);
        ctx.translate(-cx, -cy);
        drawFn();
        ctx.restore();
        if (t < 1) requestAnimationFrame(frame);
        else { drawFn(); resolve(); }
      }
      requestAnimationFrame(frame);
    }, delay);
  });
}

// Stem grows from base (inside vase) upward to flower
function growStem(x1,y1, x2,y2, duration, delay=0) {
  return new Promise(resolve => {
    setTimeout(() => {
      const { topY } = vaseGeo();
      const start = performance.now();
      // control points for gentle curve
      const cpx = x2 + (x1-x2)*0.4 + (Math.random()-0.5)*18*S;
      const cpy = y2 + (y1-y2)*0.45;
      function frame(now) {
        const t  = Math.min((now-start)/duration, 1);
        const p  = easeOut(t);
        // clip above vase top rim
        ctx.save();
        ctx.beginPath();
        ctx.rect(0, 0, W(), topY + 4*S);
        ctx.clip();
        ctx.beginPath();
        ctx.moveTo(x2, y2); // start at vase opening
        const steps = Math.max(2, Math.floor(p*35));
        for (let i = 1; i <= steps; i++) {
          const s  = (i/steps)*p;
          const bx = (1-s)*(1-s)*x2 + 2*(1-s)*s*cpx + s*s*x1;
          const by = (1-s)*(1-s)*y2 + 2*(1-s)*s*cpy + s*s*y1;
          ctx.lineTo(bx, by);
        }
        ctx.strokeStyle = '#3a7a3a';
        ctx.lineWidth = 2.2*S;
        ctx.lineCap = 'round';
        ctx.stroke();
        ctx.restore();
        if (t < 1) requestAnimationFrame(frame); else resolve();
      }
      requestAnimationFrame(frame);
    }, delay);
  });
}

// ── BOUQUET DATA ──────────────────────────────────────────────────
function buildBouquet() {
  const { topY, cx } = vaseGeo();
  // All stems converge into vase opening — base x slightly spread
  const baseY = topY + 6*S;

  const flowers = [
    // back tall
    { x: cx,         y: topY-218*S, size:33*S, color:'#f0f8ff',  delay:80  },
    { x: cx-68*S,    y: topY-198*S, size:32*S, color:'#fff8e8',  delay:160 },
    { x: cx+70*S,    y: topY-192*S, size:31*S, color:'#fce8f4',  delay:240 },
    // mid
    { x: cx-38*S,    y: topY-165*S, size:36*S, color:'#f8f4d0',  delay:380 },
    { x: cx+40*S,    y: topY-158*S, size:35*S, color:'#e8f4fc',  delay:440 },
    { x: cx-108*S,   y: topY-145*S, size:32*S, color:'#fff8e8',  delay:520 },
    { x: cx+110*S,   y: topY-138*S, size:31*S, color:'#fce8f4',  delay:560 },
    // front
    { x: cx-75*S,    y: topY-112*S, size:39*S, color:'#f0f8ff',  delay:680 },
    { x: cx+78*S,    y: topY-106*S, size:38*S, color:'#f8f4d0',  delay:740 },
    { x: cx,         y: topY- 92*S, size:41*S, color:'#fce8f4',  delay:820 },
    { x: cx-20*S,    y: topY-124*S, size:34*S, color:'#fff8e8',  delay:900 },
  ];

  const stems = flowers.map((f, i) => ({
    // top end near flower base
    x1: f.x,
    y1: f.y + f.size * 0.35,
    // base inside vase, converging toward center
    x2: cx + (f.x - cx) * 0.12,
    y2: baseY,
    d: i * 38
  }));

  const leaves = [
    { x: cx-52*S,  y: topY-82*S, sz:34*S, angle:-0.55, d:260 },
    { x: cx+55*S,  y: topY-76*S, sz:33*S, angle: 0.65, d:340 },
    { x: cx-85*S,  y: topY-62*S, sz:28*S, angle:-1.05, d:430 },
    { x: cx+88*S,  y: topY-56*S, sz:27*S, angle: 1.1,  d:480 },
    { x: cx-25*S,  y: topY-48*S, sz:26*S, angle:-0.28, d:540 },
    { x: cx+28*S,  y: topY-44*S, sz:26*S, angle: 0.35, d:580 },
  ];

  return { flowers, stems, leaves };
}

// ── FULL REDRAW (for layering) ─────────────────────────────────────
// After each async phase we need to redraw persistent layers
// We store what's been drawn:
let drawnStems   = [];
let drawnLeaves  = [];
let drawnFlowers = [];
let vaseReady    = false;
let ribbonProg   = 0;

function redrawAll() {
  ctx.clearRect(0, 0, W(), H());
  if (vaseReady) drawVase(1);
  // stems (clipped)
  const { topY } = vaseGeo();
  ctx.save();
  ctx.beginPath();
  ctx.rect(0, 0, W(), topY + 4*S);
  ctx.clip();
  drawnStems.forEach(st => {
    ctx.beginPath();
    ctx.moveTo(st.x2, st.y2);
    const dx = st.x1-st.x2, dy = st.y1-st.y2;
    ctx.quadraticCurveTo(
      st.x2 + dx*0.4 + st.cpOff, st.y2 + dy*0.45,
      st.x1, st.y1
    );
    ctx.strokeStyle = '#3a7a3a';
    ctx.lineWidth = 2.2*S;
    ctx.lineCap = 'round';
    ctx.stroke();
  });
  ctx.restore();
  drawnLeaves.forEach(l  => leaf(l.x, l.y, l.sz, l.angle));
  drawnFlowers.forEach(f => daisy(f.x, f.y, f.size, f.color));
  if (vaseReady) drawVase(1); // redraw vase on top so stems look inside
  if (ribbonProg > 0) drawRibbon(ribbonProg);
}

// ── ANIMATE ───────────────────────────────────────────────────────
async function animate() {
  drawnStems   = [];
  drawnLeaves  = [];
  drawnFlowers = [];
  vaseReady    = false;
  ribbonProg   = 0;

  ctx.clearRect(0, 0, W(), H());
  document.getElementById('title').style.opacity = '0';
  document.getElementById('replayBtn').style.opacity = '0';

  const { flowers, stems, leaves } = buildBouquet();

  // 1. Vase grows
  await new Promise(resolve => {
    const dur = 700, start = performance.now();
    function frame(now) {
      const t = Math.min((now-start)/dur, 1);
      ctx.clearRect(0, 0, W(), H());
      drawVase(t);
      if (t < 1) requestAnimationFrame(frame);
      else { vaseReady = true; resolve(); }
    }
    requestAnimationFrame(frame);
  });

  // 2. Stems emerge from vase upward
  // Pre-compute cpOff for redrawAll
  stems.forEach(st => { st.cpOff = (Math.random()-0.5)*18*S; });

  await Promise.all(stems.map(st =>
    new Promise(resolve => {
      setTimeout(() => {
        const { topY } = vaseGeo();
        const dur = 500, start = performance.now();
        const cpx = st.x2 + (st.x1-st.x2)*0.4 + st.cpOff;
        const cpy = st.y2 + (st.y1-st.y2)*0.45;
        function frame(now) {
          const t = Math.min((now-start)/dur, 1);
          const p = easeOut(t);
          redrawAll();
          ctx.save();
          ctx.beginPath();
          ctx.rect(0, 0, W(), topY + 4*S);
          ctx.clip();
          ctx.beginPath();
          ctx.moveTo(st.x2, st.y2);
          const steps = Math.max(2, Math.floor(p*35));
          for (let i = 1; i <= steps; i++) {
            const s  = (i/steps)*p;
            const bx = (1-s)*(1-s)*st.x2 + 2*(1-s)*s*cpx + s*s*st.x1;
            const by = (1-s)*(1-s)*st.y2 + 2*(1-s)*s*cpy + s*s*st.y1;
            ctx.lineTo(bx, by);
          }
          ctx.strokeStyle = '#3a7a3a';
          ctx.lineWidth = 2.2*S;
          ctx.lineCap = 'round';
          ctx.stroke();
          ctx.restore();
          if (t < 1) requestAnimationFrame(frame);
          else {
            drawnStems.push(st);
            redrawAll();
            resolve();
          }
        }
        requestAnimationFrame(frame);
      }, st.d);
    })
  ));

  // 3. Leaves
  await Promise.all(leaves.map(l =>
    growShape(() => leaf(l.x, l.y, l.sz, l.angle), l.x, l.y, 320, l.d)
      .then(() => { drawnLeaves.push(l); redrawAll(); })
  ));

  // 4. Daisies bloom
  await Promise.all(flowers.map(f =>
    growShape(() => daisy(f.x, f.y, f.size, f.color), f.x, f.y, 500, f.delay)
      .then(() => { drawnFlowers.push(f); redrawAll(); })
  ));

  // 5. Ribbon
  await new Promise(resolve => {
    const dur = 520, start = performance.now();
    function frame(now) {
      const t = Math.min((now-start)/dur, 1);
      ribbonProg = t;
      redrawAll();
      if (t < 1) requestAnimationFrame(frame); else resolve();
    }
    requestAnimationFrame(frame);
  });

  // 6. Heart fades in
  document.getElementById('title').style.opacity = '1';
  document.getElementById('replayBtn').style.opacity = '1';
}

document.getElementById('replayBtn').addEventListener('click', () => {
  setTimeout(animate, 80);
});
window.addEventListener('resize', () => { setup(); animate(); });

setup();
animate();
</script>
</body>
</html>
